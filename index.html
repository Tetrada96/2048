<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.min.css">
    <title>2048</title>
</head>
<body>
    <section class="play">
        <div class="play__field">
            <h1 class="play__heading">Сыграй в 2048</h1>
            <h2 class="hide play__score">Ваш счет: 0</h2>
            <div class="play__wrapper">
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__cell"></div>
                <div class="play__mini-wrapper">
                    <div class="play__number play__number_1">2048</div>
                    <div class="play__number play__number_2">1024</div>
                    <div class="play__number play__number_3">512</div>
                </div>
            </div>
            <button class="play__button">Start</button>
            <div class="play__direction">
                <div class="play__direction-up"><img src="https://w7.pngwing.com/pngs/900/910/png-transparent-computer-icons-arrow-directional-signages-angle-hand-%D1%81%D1%82%D1%80%D0%B5%D0%BB%D0%BA%D0%B0.png" alt=""></div>
                <div class="play__direction-right"><img src="https://w7.pngwing.com/pngs/900/910/png-transparent-computer-icons-arrow-directional-signages-angle-hand-%D1%81%D1%82%D1%80%D0%B5%D0%BB%D0%BA%D0%B0.png" alt=""></div>
                <div class="play__direction-down"><img src="https://w7.pngwing.com/pngs/900/910/png-transparent-computer-icons-arrow-directional-signages-angle-hand-%D1%81%D1%82%D1%80%D0%B5%D0%BB%D0%BA%D0%B0.png" alt=""></div>
                <div class="play__direction-left"><img src="https://w7.pngwing.com/pngs/900/910/png-transparent-computer-icons-arrow-directional-signages-angle-hand-%D1%81%D1%82%D1%80%D0%B5%D0%BB%D0%BA%D0%B0.png" alt=""></div>
            </div>
        </div>
    </section>
    <script src="index.js"></script>
</body>
</html>
